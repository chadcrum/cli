name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/ci.yaml

  lint:
    if: startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/lint.yaml

  release:
    needs: [ci, lint]
    if: >-
      always() &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped') &&
      (needs.lint.result == 'success' || needs.lint.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GoReleaser (release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser (snapshot)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean

      - name: Upload snapshot to rolling pre-release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete main --yes --cleanup-tag 2>/dev/null || true
          cat <<NOTES > /tmp/release-notes.md
          Rolling pre-release built from \`main\` at ${GITHUB_SHA:0:7}.

          **This is not a stable release.** It reflects the latest merged code and is replaced on every push to main.
          NOTES
          gh release create main --prerelease --title "Latest Build (main)" --notes-file /tmp/release-notes.md dist/*.tar.gz dist/*.zip dist/checksums.txt

      - name: Upload immutable SHA pre-release
        if: "!startsWith(github.ref, 'refs/tags/')"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${GITHUB_SHA:0:7}" --yes --cleanup-tag 2>/dev/null || true
          cat <<NOTES > /tmp/release-notes.md
          Snapshot build from \`${GITHUB_REF_NAME}\` at ${GITHUB_SHA:0:7}.
          NOTES
          gh release create "${GITHUB_SHA:0:7}" --prerelease --title "${GITHUB_SHA:0:7}" --notes-file /tmp/release-notes.md dist/*.tar.gz dist/*.zip dist/checksums.txt
